<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BoiVerso</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Nunito+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --night:#0B2E24;
  --river:#12463A;
  --gold:#F2B705;
  --toada:#E1552E;
  --cream:#F7EFDC;
  --leaf:#3E8E5C;
  --ink:#0B2E24;
  --danger:#C0392B;
}
*{box-sizing:border-box;}
body{
  margin:0; min-height:100vh;
  background:
    radial-gradient(circle at 15% 10%, rgba(242,183,5,0.10), transparent 40%),
    radial-gradient(circle at 90% 85%, rgba(225,85,46,0.12), transparent 45%),
    var(--night);
  color:var(--cream);
  font-family:'Nunito Sans', sans-serif;
  padding:0;
}
h1,h2,h3,.display{ font-family:'Baloo 2', sans-serif; }
.wrap{max-width:980px;margin:0 auto;padding:28px 18px 60px;}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;flex-wrap:wrap;gap:8px;}
.brand{display:flex;align-items:center;gap:10px;}
.brand .ox{font-size:32px;}
.brand h1{font-size:22px;margin:0;letter-spacing:0.5px;color:var(--gold);}
.roomtag{font-size:13px;background:rgba(247,239,220,0.08);border:1px solid rgba(247,239,220,0.18);padding:6px 12px;border-radius:20px;}
.card{
  background:rgba(247,239,220,0.05);
  border:1px solid rgba(247,239,220,0.14);
  border-radius:18px;
  padding:26px;
  margin-bottom:18px;
}
.card h2{margin-top:0;color:var(--gold);font-size:20px;}
.muted{color:rgba(247,239,220,0.65);font-size:14px;line-height:1.5;}
label{display:block;font-size:13px;margin-bottom:6px;color:rgba(247,239,220,0.8);}
input[type=text], textarea{
  width:100%;padding:10px 12px;border-radius:10px;border:1px solid rgba(247,239,220,0.25);
  background:rgba(0,0,0,0.2);color:var(--cream);font-size:15px;font-family:inherit;
}
button{
  font-family:'Nunito Sans',sans-serif; font-weight:700; cursor:pointer;
  border:none;border-radius:12px;padding:11px 20px;font-size:14px;
  background:var(--gold);color:#2A1D02;
  transition:transform .12s ease, box-shadow .12s ease;
}
button:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(0,0,0,0.25);}
button:disabled{opacity:0.4;cursor:not-allowed;transform:none;box-shadow:none;}
button.secondary{background:rgba(247,239,220,0.1);color:var(--cream);border:1px solid rgba(247,239,220,0.25);}
button.danger{background:var(--danger);color:#fff;}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
@media (max-width:700px){.grid2{grid-template-columns:1fr;}}
.teamcard{border-radius:14px;padding:18px;border:2px solid;position:relative;}
.teamcard.A{border-color:#6FB3E0;}
.teamcard.B{border-color:#E07B39;}
.pill{display:inline-block;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:700;margin-right:6px;background:rgba(255,255,255,0.12);}
.memberlist{list-style:none;padding:0;margin:10px 0;}
.memberlist li{padding:5px 0;font-size:14px;border-bottom:1px dashed rgba(247,239,220,0.15);}
.memberlist li:last-child{border-bottom:none;}
.pres{color:var(--gold);font-weight:800;}
.colorswatch{display:inline-block;width:26px;height:26px;border-radius:50%;border:2px solid rgba(255,255,255,0.4);cursor:pointer;margin:4px;vertical-align:middle;}
.colorswatch.selected{outline:3px solid var(--gold);outline-offset:2px;}
.colorswatch.disabled{opacity:0.15;cursor:not-allowed;}
canvas{background:#fff;border-radius:10px;touch-action:none;max-width:100%;}
.toolbar{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-bottom:10px;}
.tool-btn{padding:8px 12px;background:rgba(247,239,220,0.1);color:var(--cream);border:1px solid rgba(247,239,220,0.25);border-radius:10px;font-size:13px;}
.tool-btn.active{background:var(--gold);color:#2A1D02;}
.itemhead{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px;flex-wrap:wrap;gap:10px;}
.itemhead h2{margin:0;}
.timer{font-size:26px;font-weight:800;color:var(--gold);font-family:'Baloo 2';}
.catbtn{border:2px solid rgba(247,239,220,0.25);background:rgba(247,239,220,0.05);color:var(--cream);border-radius:14px;padding:18px;text-align:left;flex:1;min-width:200px;}
.catbtn:hover{border-color:var(--gold);}
.catbtn.taken{opacity:0.35;cursor:not-allowed;}
.catbtn h3{margin:0 0 6px;color:var(--gold);}
.chatbox{border:1px solid rgba(247,239,220,0.2);border-radius:12px;padding:10px;height:160px;overflow-y:auto;background:rgba(0,0,0,0.15);font-size:13px;margin-bottom:8px;}
.chatline b{color:var(--gold);}
table{width:100%;border-collapse:collapse;font-size:13px;}
th,td{padding:8px 6px;text-align:center;border-bottom:1px solid rgba(247,239,220,0.15);}
th{color:var(--gold);font-family:'Baloo 2';font-weight:700;}
.slideshow{text-align:center;}
.slideshow img{max-width:100%;max-height:420px;border-radius:12px;background:#fff;}
.thumbgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;margin-top:12px;}
.thumb{background:rgba(0,0,0,0.15);border-radius:10px;padding:8px;text-align:center;font-size:12px;}
.thumb img{width:100%;border-radius:6px;background:#fff;margin-bottom:6px;}
.winner{font-size:26px;color:var(--gold);font-family:'Baloo 2';text-align:center;margin:14px 0;}
.hidden{display:none !important;}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(247,239,220,0.3);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.justif{background:rgba(0,0,0,0.15);border-radius:10px;padding:10px;margin-top:6px;font-size:13px;text-align:left;}
.phaseflag{font-size:12px;color:rgba(247,239,220,0.5);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div class="brand">
      <svg class="ox" width="42" height="42" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M6 22c-4 10 1 22 12 24 4 1 7-1 8-4 1 8 4 15 4 15L20 66c-3 2-3 6 0 8l6 4c2 1 5 1 7-1l7-7c3 3 7 5 10 5s7-2 10-5l7 7c2 2 5 2 7 1l6-4c3-2 3-6 0-8l-10-9s3-7 4-15c1 3 4 5 8 4 11-2 16-14 12-24-3-8-11-12-18-8-6 4-8 12-6 18-6-3-13-5-20-5s-14 2-20 5c2-6 0-14-6-18-7-4-15 0-18 8z" fill="var(--gold)"/>
        <ellipse cx="37" cy="52" rx="6.5" ry="8.5" fill="var(--night)"/>
        <ellipse cx="63" cy="52" rx="6.5" ry="8.5" fill="var(--night)"/>
        <ellipse cx="50" cy="66" rx="12" ry="9" fill="var(--night)" opacity="0.15"/>
        <circle cx="45" cy="70" r="2.5" fill="var(--night)"/>
        <circle cx="55" cy="70" r="2.5" fill="var(--night)"/>
        <path d="M43 74c3 2 11 2 14 0" stroke="var(--night)" stroke-width="2" fill="none" stroke-linecap="round"/>
      </svg>
      <h1>BoiVerso</h1>
    </div>
    <div id="roomTagWrap"></div>
  </div>
  <div id="app"></div>
</div>

<script>
/* ============ DATA ============ */
const CATEGORY_LABELS = {
  masc: "Itens masculinos e coletivos",
  fem: "Itens femininos e Auto do Boi",
  aleg: "Alegorias"
};
const ITEMS = [
  {num:1,cat:'masc',name:'Apresentador',desc:'Fantasia de acordo com o tema proposto pela Comissão de Artes — o item é um apresentador do espetáculo.'},
  {num:2,cat:'masc',name:'Levantador de Toadas',desc:'Fantasia de acordo com o tema — o item é um intérprete musical.'},
  {num:3,cat:'masc',name:'Batucada / Marujada',desc:'Fantasia de acordo com o tema — conjunto percussivo que dita o ritmo; deve haver algum instrumento no desenho.'},
  {num:5,cat:'fem',name:'Porta-Estandarte',desc:'Fantasia de acordo com o tema — dançarina que conduz e defende o símbolo oficial do boi. Se o desenho não apresentar um estandarte, deve ser despontuado.'},
  {num:6,cat:'masc',name:'Amo do Boi',desc:'Fantasia de acordo com o tema — personagem que representa o dono da fazenda, cantando versos e desafios.'},
  {num:7,cat:'fem',name:'Sinhazinha da Fazenda',desc:'Fantasia de acordo com o tema — figura de extrema elegância e doçura, com vestido colonial.'},
  {num:8,cat:'fem',name:'Rainha do Folclore',desc:'Fantasia de acordo com o tema — dançarina que representa a miscigenação e alegria das manifestações folclóricas.'},
  {num:9,cat:'fem',name:'Cunhã-Poranga',desc:'Fantasia de acordo com o tema — representação da mulher mais bela e guerreira da tribo.'},
  {num:4,cat:'aleg',name:'Ritual Indígena',desc:'Item alegórico com características indígenas e sobrenaturais.'},
  {num:11,cat:'masc',name:'Pajé',desc:'Fantasia de acordo com o tema — xamã e líder espiritual, responsável pelos rituais de cura e conexão com a natureza.'},
  {num:12,cat:'masc',name:'Povos Indígenas',desc:'Fantasia de acordo com o tema — representa as diferentes etnias indígenas da Amazônia.'},
  {num:13,cat:'aleg',name:'Tuxauas',desc:'Item alegórico — líderes e chefes de tribos indígenas, com indumentárias suntuosas.'},
  {num:14,cat:'aleg',name:'Figura Típica Regional',desc:'Item alegórico — personagens, ribeirinhos ou lendas típicas da região amazônica.'},
  {num:16,cat:'aleg',name:'Lenda Amazônica',desc:'Item alegórico — reconstituição cênica de mitos e histórias das tradições amazônicas.'},
  {num:17,cat:'masc',name:'Vaqueirada',desc:'Fantasia de acordo com o tema — vaqueiro que guarda o boi.'},
  {num:18,cat:'fem',name:'Pai Francisco e Mãe Catirina',desc:'Fantasia de acordo com o tema — um negro e uma negra grávida que cuidam da fazenda.'}
];
const ITEM10 = {num:10,name:'Boi-Bumbá (Evolução)',desc:'A figura central do espetáculo em si.'};
const ITEM15 = {num:15,name:'Alegorias (Conjunto)',desc:'Julgamento do conjunto das alegorias, composto pelos itens 04, 14 e 16.'};
const JUDGES = [
  {name:'Hyldes Kamara', persona:'Você é um jurado gentil e pouco rigoroso. Você valoriza o esforço e a criatividade, é generoso nas notas (raramente abaixo de 6) e escreve justificativas breves e encorajadoras, sempre em português.'},
  {name:'Lupita Celeste', persona:'Você é um jurado pontual e objetivo. Você avalia estritamente se o desenho atende ao critério técnico descrito, sem floreios, com notas equilibradas e justificativas curtas e diretas, sempre em português.'},
  {name:'Giane Malu', persona:'Você é um jurado extremamente crítico e rigoroso. Você aponta falhas de composição, fidelidade ao tema e execução, é duro nas notas (não hesita em dar notas baixas) e escreve justificativas mais longas e severas, sempre em português.'}
];
const COLOR_OPTIONS = [
  {name:'Azul', hex:'#2E6DB4'},{name:'Vermelho', hex:'#D64545'},
  {name:'Verde', hex:'#2E8B57'},{name:'Amarelo', hex:'#F2C14E'},
  {name:'Roxo', hex:'#8E5FA8'},{name:'Laranja', hex:'#E07B39'},
  {name:'Rosa', hex:'#E0629B'},{name:'Preto', hex:'#3A3A3A'}
];
const DRAW_PALETTE = ['#000000','#FFFFFF','#8B5A2B', ...COLOR_OPTIONS.map(c=>c.hex), '#6EC6FF','#B0BEC5'];

/* ============ STATE / STORAGE HELPERS ============ */
let myId = 'p_' + Math.random().toString(36).slice(2,10);
let myName = '';
let roomCode = null;
let room = null; // last loaded room object
let pollTimer = null;
let currentTool = 'brush';
let currentColor = '#000000';
let brushSize = 6;
let drawing = false;
let lastPt = null;
let itemTimerInterval = null;
let itemTimeLeft = 90;
let festivalIdx = 0;
let festivalTimer = null;

// Se o front-end estiver hospedado separadamente do back-end (ex.: Cloudflare Pages
// chamando uma API no Render), defina window.API_BASE = "https://seu-app.onrender.com"
// antes deste script, ou edite a linha abaixo. Deixe "" se front e back estiverem juntos.
const API_BASE = window.API_BASE || '';

async function loadRoom(code){
  try{
    const r = await fetch(`${API_BASE}/api/room/${code}`);
    if(!r.ok) return null;
    return await r.json();
  }catch(e){ return null; }
}
async function saveRoom(code, data){
  data.version = (data.version||0)+1;
  try{
    await fetch(`${API_BASE}/api/room/${code}`, {
      method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(data)
    });
  }catch(e){ console.error(e); }
  room = data;
}
function genCode(){
  const chars='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let c=''; for(let i=0;i<5;i++) c+=chars[Math.floor(Math.random()*chars.length)];
  return c;
}

/* ============ ROOM ACTIONS ============ */
async function createRoom(name){
  myName = name;
  roomCode = genCode();
  const data = {
    code: roomCode, version:0,
    players: { [myId]: {name, teamId:null} },
    teams: {
      A: {name:'Agremiação A', colorHex:null, colorName:null, presidentId:null, members:[]},
      B: {name:'Agremiação B', colorHex:null, colorName:null, presidentId:null, members:[]}
    },
    phase: 'lobby',
    categoryAssignments: {A:{}, B:{}},
    itemAssignments: {A:{}, B:{}}, // itemNum -> playerId
    playerProgress: {}, // playerId -> {list:[itemNums in order], idx:0}
    drawings: {A:{}, B:{}}, // itemNum -> dataURL
    oxDrawings: {A:null, B:null},
    chat: {A:[], B:[]},
    scores: null,
    scoringInProgress:false,
    festivalReady: {A:false,B:false}
  };
  await saveRoom(roomCode, data);
  startPolling();
  render();
}
async function joinRoom(code, name){
  const data = await loadRoom(code);
  if(!data){ alert('Sala não encontrada. Confira o código.'); return; }
  myName = name; roomCode = code;
  if(!data.players[myId]) data.players[myId] = {name, teamId:null};
  await saveRoom(code, data);
  startPolling();
  render();
}
function startPolling(){
  if(pollTimer) clearInterval(pollTimer);
  pollTimer = setInterval(async ()=>{
    const fresh = await loadRoom(roomCode);
    if(fresh && (!room || fresh.version !== room.version)){
      room = fresh; render();
    }
  }, 2000);
}

async function joinTeam(teamId){
  const data = await loadRoom(roomCode);
  data.players[myId].teamId = teamId;
  const t = data.teams[teamId];
  if(!t.members.find(m=>m.id===myId)) t.members.push({id:myId, name:myName});
  if(!t.presidentId) t.presidentId = myId;
  await saveRoom(roomCode, data); render();
}
async function setTeamIdentity(teamId, name, colorName, colorHex){
  const data = await loadRoom(roomCode);
  const rival = teamId==='A' ? 'B' : 'A';
  if(data.teams[rival].colorHex === colorHex){ alert('A outra agremiação já escolheu essa cor.'); return; }
  data.teams[teamId].name = name || data.teams[teamId].name;
  data.teams[teamId].colorName = colorName;
  data.teams[teamId].colorHex = colorHex;
  await saveRoom(roomCode, data); render();
}
async function startCategoryPhase(){
  const data = await loadRoom(roomCode);
  data.phase = 'draw_ox';
  await saveRoom(roomCode, data); render();
}

function myTeamId(){ return room && room.players[myId] ? room.players[myId].teamId : null; }
function isPresident(teamId){ return room.teams[teamId].presidentId === myId; }

async function submitOxDrawing(teamId, dataUrl){
  const data = await loadRoom(roomCode);
  data.oxDrawings[teamId] = dataUrl;
  data.phase = data.oxDrawings.A && data.oxDrawings.B ? 'categories' : data.phase;
  await saveRoom(roomCode, data); render();
}
async function sendChat(teamId, text){
  const data = await loadRoom(roomCode);
  data.chat[teamId].push({playerId:myId, name:myName, text, ts:Date.now()});
  await saveRoom(roomCode, data); render();
}

async function pickCategory(teamId, cat){
  const data = await loadRoom(roomCode);
  const already = Object.values(data.categoryAssignments[teamId]);
  if(already.includes(cat)) return;
  data.categoryAssignments[teamId][myId] = cat;
  const members = data.teams[teamId].members;
  const chosen = data.categoryAssignments[teamId];
  if(Object.keys(chosen).length === members.length){
    buildItemAssignments(data, teamId);
    data.phase = bothTeamsReadyForDrawing(data) ? 'draw_items' : data.phase;
  }
  await saveRoom(roomCode, data); render();
}
function bothTeamsReadyForDrawing(data){
  return Object.keys(data.playerProgress).length>0 &&
    ['A','B'].every(t=>data.teams[t].members.every(m=>data.playerProgress[m.id]));
}
function buildItemAssignments(data, teamId){
  const members = data.teams[teamId].members;
  const chosen = data.categoryAssignments[teamId];
  if(members.length===1){
    const list = ITEMS.map(i=>i.num);
    data.playerProgress[members[0].id] = {list, idx:0};
    ITEMS.forEach(i=>data.itemAssignments[teamId][i.num]=members[0].id);
    return;
  }
  const chosenCats = new Set(Object.values(chosen));
  const allCats = ['masc','fem','aleg'];
  const leftover = allCats.filter(c=>!chosenCats.has(c));
  // assign directly chosen categories
  const progress = {}; members.forEach(m=>progress[m.id]={list:[], idx:0});
  ITEMS.forEach(item=>{
    const owner = Object.entries(chosen).find(([pid,c])=>c===item.cat);
    if(owner){ progress[owner[0]].list.push(item.num); data.itemAssignments[teamId][item.num]=owner[0]; }
  });
  // leftover categories' items split randomly & evenly among all members
  let leftoverItems = ITEMS.filter(i=>leftover.includes(i.cat)).map(i=>i.num);
  leftoverItems.sort(()=>Math.random()-0.5);
  let mi=0;
  leftoverItems.forEach(num=>{
    const pid = members[mi % members.length].id;
    progress[pid].list.push(num);
    data.itemAssignments[teamId][num]=pid;
    mi++;
  });
  Object.entries(progress).forEach(([pid,p])=>{
    p.list.sort((a,b)=>a-b);
    data.playerProgress[pid]=p;
  });
}

async function submitItemDrawing(itemNum, dataUrl){
  const data = await loadRoom(roomCode);
  const t = myTeamId();
  data.drawings[t][itemNum] = dataUrl;
  const prog = data.playerProgress[myId];
  prog.idx += 1;
  // check if both teams fully done
  const allDone = ['A','B'].every(team=>{
    return data.teams[team].members.every(m=>{
      const pp = data.playerProgress[m.id];
      return pp && pp.idx >= pp.list.length;
    });
  });
  if(allDone) data.phase = 'festival';
  await saveRoom(roomCode, data); render();
}

async function markFestivalReady(teamId){
  const data = await loadRoom(roomCode);
  data.festivalReady[teamId]=true;
  if(data.festivalReady.A && data.festivalReady.B) data.phase='judging';
  await saveRoom(roomCode, data); render();
}

/* ============ AI JUDGING ============ */
async function runJudging(){
  const data = await loadRoom(roomCode);
  if(data.scoringInProgress || data.scores) { room=data; render(); return; }
  data.scoringInProgress = true;
  await saveRoom(roomCode, data); render();

  const results = {A:{}, B:{}};
  for(const teamId of ['A','B']){
    for(const judge of JUDGES){
      const content = [];
      content.push({type:'text', text: judge.persona + "\n\nVocê vai avaliar os desenhos de fantasias/itens de uma agremiação de boi-bumbá (estilo Festival de Parintins). Para cada item, dê uma nota de 0 a 10 (pode usar casas decimais) e uma justificativa curta em português (1-2 frases). Responda APENAS com um JSON válido, um array de objetos no formato: [{\"item\":NUM, \"score\":NUM, \"justificativa\":\"...\"}], sem nenhum texto antes ou depois, sem markdown."});
      ITEMS.forEach(item=>{
        const d = data.drawings[teamId][item.num];
        if(d){
          content.push({type:'text', text: `Item ${item.num} — ${item.name}. Critério: ${item.desc}`});
          content.push({type:'image', source:{type:'base64', media_type:'image/jpeg', data: d.split(',')[1]}});
        }
      });
      // Item 15 ensemble: items 4,14,16
      content.push({type:'text', text:`Item 15 — ${ITEM15.name}. Critério: ${ITEM15.desc} Avalie o conjunto formado pelas três imagens de alegorias a seguir (itens 04, 14 e 16 já mostrados acima, considere-os em conjunto).`});
      [4,14,16].forEach(n=>{
        const d = data.drawings[teamId][n];
        if(d) content.push({type:'image', source:{type:'base64', media_type:'image/jpeg', data:d.split(',')[1]}});
      });
      try{
        const resp = await fetch(`${API_BASE}/api/judge`, {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({content})
        });
        const json = await resp.json();
        let text = (json.content||[]).map(b=>b.text||'').join('');
        text = text.replace(/```json|```/g,'').trim();
        const parsed = JSON.parse(text);
        parsed.forEach(entry=>{
          if(!results[teamId][entry.item]) results[teamId][entry.item] = [];
          results[teamId][entry.item].push({judge:judge.name, score:Number(entry.score), justificativa:entry.justificativa});
        });
      }catch(e){
        console.error('Erro ao julgar', teamId, judge.name, e);
      }
    }
  }
  const fresh = await loadRoom(roomCode);
  fresh.scores = results;
  fresh.scoringInProgress = false;
  fresh.phase = 'results';
  await saveRoom(roomCode, fresh); render();
}

function computeItemTotal(scoresArr){
  if(!scoresArr || scoresArr.length===0) return {total:0, discarded:null};
  const sorted = [...scoresArr].sort((a,b)=>a.score-b.score);
  const discarded = sorted[0];
  const kept = sorted.slice(1);
  return {total: kept.reduce((s,x)=>s+x.score,0), discarded};
}
function teamGrandTotal(teamId){
  if(!room.scores) return 0;
  let total=0;
  Object.keys(room.scores[teamId]).forEach(itemNum=>{
    total += computeItemTotal(room.scores[teamId][itemNum]).total;
  });
  return Math.round(total*100)/100;
}

/* ============ CANVAS DRAWING ============ */
function setupCanvas(canvas){
  const ctx = canvas.getContext('2d');
  ctx.fillStyle='#fff'; ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.lineJoin='round'; ctx.lineCap='round';
  let shapeStart=null; let snapshot=null;

  function getPos(e){
    const rect = canvas.getBoundingClientRect();
    const cx = (e.touches? e.touches[0].clientX : e.clientX) - rect.left;
    const cy = (e.touches? e.touches[0].clientY : e.clientY) - rect.top;
    return {x: cx*(canvas.width/rect.width), y: cy*(canvas.height/rect.height)};
  }
  function floodFill(x,y,fillColor){
    x=Math.floor(x); y=Math.floor(y);
    const img = ctx.getImageData(0,0,canvas.width,canvas.height);
    const d = img.data;
    const idx = (y*canvas.width+x)*4;
    const target = [d[idx],d[idx+1],d[idx+2],d[idx+3]];
    const fr = parseInt(fillColor.slice(1,3),16), fg=parseInt(fillColor.slice(3,5),16), fb=parseInt(fillColor.slice(5,7),16);
    if(target[0]===fr && target[1]===fg && target[2]===fb) return;
    const stack=[[x,y]]; let guard=0;
    function match(i){ return Math.abs(d[i]-target[0])<20 && Math.abs(d[i+1]-target[1])<20 && Math.abs(d[i+2]-target[2])<20; }
    while(stack.length && guard<400000){
      guard++;
      const [cx,cy]=stack.pop();
      if(cx<0||cy<0||cx>=canvas.width||cy>=canvas.height) continue;
      const i=(cy*canvas.width+cx)*4;
      if(!match(i)) continue;
      d[i]=fr; d[i+1]=fg; d[i+2]=fb; d[i+3]=255;
      stack.push([cx+1,cy],[cx-1,cy],[cx,cy+1],[cx,cy-1]);
    }
    ctx.putImageData(img,0,0);
  }
  function start(e){
    e.preventDefault(); drawing=true;
    const p = getPos(e);
    if(currentTool==='bucket'){ floodFill(p.x,p.y,currentColor); drawing=false; return; }
    if(currentTool==='rect' || currentTool==='circle'){
      shapeStart=p; snapshot = ctx.getImageData(0,0,canvas.width,canvas.height); return;
    }
    lastPt=p;
    ctx.beginPath(); ctx.moveTo(p.x,p.y);
  }
  function move(e){
    if(!drawing) return; e.preventDefault();
    const p = getPos(e);
    if(currentTool==='rect' || currentTool==='circle'){
      ctx.putImageData(snapshot,0,0);
      ctx.strokeStyle=currentColor; ctx.lineWidth=brushSize;
      ctx.beginPath();
      if(currentTool==='rect'){ ctx.rect(shapeStart.x, shapeStart.y, p.x-shapeStart.x, p.y-shapeStart.y); }
      else{ const r=Math.hypot(p.x-shapeStart.x,p.y-shapeStart.y); ctx.arc(shapeStart.x,shapeStart.y,r,0,Math.PI*2); }
      ctx.stroke();
      return;
    }
    ctx.strokeStyle = currentTool==='eraser' ? '#FFFFFF' : currentColor;
    ctx.lineWidth = currentTool==='eraser' ? brushSize*3 : brushSize;
    ctx.lineTo(p.x,p.y); ctx.stroke();
    lastPt=p;
  }
  function end(e){ drawing=false; shapeStart=null; }
  canvas.addEventListener('mousedown', start); canvas.addEventListener('touchstart', start, {passive:false});
  canvas.addEventListener('mousemove', move); canvas.addEventListener('touchmove', move, {passive:false});
  window.addEventListener('mouseup', end); window.addEventListener('touchend', end);
  return ctx;
}

/* ============ TIMER ============ */
function startItemTimer(onExpire){
  clearInterval(itemTimerInterval);
  itemTimeLeft = 90;
  itemTimerInterval = setInterval(()=>{
    itemTimeLeft--;
    const el = document.getElementById('timerDisplay');
    if(el) el.textContent = fmtTime(itemTimeLeft);
    if(itemTimeLeft<=0){ clearInterval(itemTimerInterval); onExpire(); }
  },1000);
}
function fmtTime(s){ const m=Math.floor(s/60); const r=s%60; return m+':'+String(r).padStart(2,'0'); }

/* ============ RENDER ============ */
function el(html){ const d=document.createElement('div'); d.innerHTML=html; return d.firstElementChild; }
function esc(s){ return (s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function render(){
  const app = document.getElementById('app');
  const roomTagWrap = document.getElementById('roomTagWrap');
  roomTagWrap.innerHTML = roomCode ? `<span class="roomtag">Sala: <b>${roomCode}</b></span>` : '';
  if(!roomCode || !room){ app.innerHTML=''; app.appendChild(renderEntry()); return; }

  clearInterval(itemTimerInterval); // reset visual timer handling per render unless in draw_items with same item

  let node;
  switch(room.phase){
    case 'lobby': node = renderLobby(); break;
    case 'draw_ox': node = renderDrawOx(); break;
    case 'categories': node = renderCategories(); break;
    case 'draw_items': node = renderDrawItems(); break;
    case 'festival': node = renderFestival(); break;
    case 'judging': node = renderJudging(); break;
    case 'results': node = renderResults(); break;
    default: node = el('<div>Fase desconhecida.</div>');
  }
  app.innerHTML=''; app.appendChild(node);
}

function renderCanvasTool(w,h,onSubmit,submitLabel,excludeHex){

  const submitBtn = el(`<button style="margin-top:12px;">${submitLabel}</button>`);

  wrap.appendChild(toolbar); wrap.appendChild(palette); wrap.appendChild(canvas); wrap.appendChild(submitBtn);

  return wrap;
}

function renderFestival(){

  if(!room.festivalReady.A || !room.festivalReady.B){
    wrap.innerHTML = `<h2>Aguardando...</h2><p class="muted">Esperando a outra agremiação clicar em "Apresentar Festival".</p>`;
    return wrap;
  }
  // build slideshow list: team A items (1..18 excluding 15) then team B, including ox(10)
  const order = [];
  ['A','B'].forEach(team=>{
    const nums = [10, ...ITEMS.map(i=>i.num)].sort((a,b)=>a-b);
    nums.forEach(n=>{
      const src = n===10 ? room.oxDrawings[team] : room.drawings[team][n];
      if(src) order.push({team, num:n, name: n===10?ITEM10.name:ITEMS.find(i=>i.num===n).name, src});
    });
  });
  if(!window.__festivalOrder) window.__festivalOrder = order;
  const idxHolder = el(`<div></div>`);
  function showSlide(i){
    const s = order[i];
    if(!s){
      idxHolder.innerHTML = `<p class="muted">Fim da apresentação.</p>`;
      const btn = el(`<button>Ver Apuração</button>`);
      btn.onclick=()=>{ clearInterval(festivalTimer); runJudging(); };
      idxHolder.appendChild(btn);
      return;
    }
    idxHolder.innerHTML = `<div class="slideshow"><div class="phaseflag">Agremiação ${s.team} — ${room.teams[s.team].name}</div><h2>Item ${s.num} — ${esc(s.name)}</h2><img src="${s.src}"></div>`;
  }
  wrap.innerHTML = `<h2>Apresentação do Festival</h2>`;
  wrap.appendChild(idxHolder);
  showSlide(0);
  clearInterval(festivalTimer);
  let i=0;
  festivalTimer = setInterval(()=>{
    i++; showSlide(i);
    if(i>=order.length) clearInterval(festivalTimer);
  }, 15000);
  return wrap;
}

function buildJustifHtml(){
  let html='';
  const allJudged = [...ITEMS.map(i=>i.num), 15].sort((a,b)=>a-b);
  ['A','B'].forEach(team=>{
    html += `<h3>${esc(room.teams[team].name)}</h3>`;
    allJudged.forEach(num=>{
      const name = num===15? ITEM15.name : ITEMS.find(i=>i.num===num).name;
      const arr = room.scores[team][num]||[];
      html += `<div class="justif"><b>Item ${num} — ${esc(name)}</b><br>`;
      arr.forEach(s=>{ html += `<div><i>${esc(s.judge)}</i>: nota ${s.score} — ${esc(s.justificativa)}</div>`; });
      html += `</div>`;
    });
  });
  return html;
}

render();
